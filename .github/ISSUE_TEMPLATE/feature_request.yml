name: Feature Request ✨
description: Suggest a new feature or enhancement
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Help us understand what you'd like to build.

  - type: textarea
    id: description
    attributes:
      label: 🎯 Feature Description
      description: Clear description of the feature you want to add
      placeholder: "What feature would you like to see?"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 💡 Motivation
      description: Why would this feature be useful? What problems does it solve?
      placeholder: "Describe the motivation and benefits"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 🔧 Proposed Solution
      description: How should this feature work? Any implementation ideas?
      placeholder: "Describe your proposed solution"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🤔 Alternatives Considered
      description: Have you considered other approaches?
      placeholder: "Describe alternative solutions or workarounds"

  - type: textarea
    id: context
    attributes:
      label: 📋 Additional Context
      description: Code snippets, links, examples, or other relevant info
      placeholder: "Add any other context about the feature request here"

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Verification
      options:
        - label: I've checked if this feature already exists
          required: true
        - label: This feature aligns with Cbowcrptex's goals
          required: true
